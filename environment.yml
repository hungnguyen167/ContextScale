name: contextscale
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11.14
  - pip
  - pip:
    - torch==2.9.0
    - torchvision==0.24.0
    - accelerate==1.10.1
    - peft==0.17.1
    - safetensors==0.6.2
    - transformers==4.57.1
    - tokenizers==0.22.1
    - huggingface-hub==0.35.3
    - datasets==4.2.0
    - gensim==4.3.3
    - spacy==3.8.7
    - nltk==3.9.2
    - numpy==1.26.4
    - pandas==2.3.3
    - scikit-learn==1.7.2
    - scipy==1.13.1
    - matplotlib==3.10.7
    - seaborn==0.13.2
    - tqdm==4.67.1
    - jupyter==1.1.1
    - nbconvert==7.16.4
# Create environment:  conda env create -f environment.yml
# Activate:            conda activate contextscale
# GPU note: Replace torch/torchvision pip entries with CUDA-specific wheels
#   if your machine has CUDA 12.x/13.x support (see requirements.txt for details).
